@if (message().isOutgoing) {
<!-- User message -->
<div class="message-row d-flex justify-content-end mb-4">
  <div class="d-flex flex-column align-items-end" style="max-width: 75%;">
    <div
      class="p-3 rounded-4 message-user-bubble"
      role="article"
      aria-label="Your message"
    >
      <div class="message-content">{{ message().content }}</div>
    </div>
    <div class="message-actions d-flex justify-content-end gap-1 mt-1">
      <button
        type="button"
        class="btn btn-link btn-sm p-1 msg-action-btn"
        title="Copy"
        (click)="copyMessage()"
        aria-label="Copy message"
      >
        <i class="bi" [class.bi-copy]="!messageCopied()" [class.bi-check-lg]="messageCopied()"></i>
      </button>
    </div>
  </div>
</div>
} @else {
<!-- Assistant message -->
<div class="message-row d-flex align-items-start gap-3 mb-4">
  <div
    class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 assistant-avatar"
  >
    A
  </div>
  <div class="flex-grow-1" style="min-width: 0;">
    <div class="assistant-label fw-semibold mb-1">AI Assistant</div>
    <div
      #messageContent
      [innerHTML]="message().markdown"
      class="message-content assistant-text"
    ></div>
    @if (canCopyMessage()) {
    <div class="message-actions d-flex gap-1 mt-1">
      <button
        type="button"
        class="btn btn-link btn-sm p-1 msg-action-btn"
        [class.copied]="messageCopied()"
        (click)="copyMessage()"
        [attr.aria-label]="messageCopied() ? 'Message copied' : 'Copy message'"
        [title]="messageCopied() ? 'Copied!' : 'Copy message'"
      >
        <i class="bi" [class.bi-clipboard-check]="messageCopied()" [class.bi-copy]="!messageCopied()"></i>
      </button>
    </div>
    }
  </div>
</div>
}
