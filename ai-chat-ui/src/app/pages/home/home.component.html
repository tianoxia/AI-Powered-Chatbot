<div
  class="d-flex flex-column h-100"
  style="background-color: var(--bg-primary);"
>
  <!-- Scrollable chat area -->
  <div
    #scrollContainer
    class="flex-grow-1 overflow-y-auto d-flex flex-column align-items-center px-3 pt-3"
    role="log"
    aria-live="polite"
    aria-label="Chat conversation"
  >
    <div class="w-100" style="max-width: 768px;">
      @for (message of storeService.messages(); track trackByMessage($index,
      message)) {
      <app-message-bubble [message]="message"></app-message-bubble>
      } @if (storeService.isStreaming() && !storeService.showStreamLoader()) {
      <app-message-bubble
        [message]="storeService.streamMessage()"
      ></app-message-bubble>
      } @if (storeService.showStreamLoader()) {
      <div class="d-flex justify-content-start mb-4">
        <div class="spinner-border streaming-spinner" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      }
    </div>
  </div>

  <!-- Prompt box pinned to bottom, centered -->
  <div
    class="d-flex flex-column align-items-center px-3 pb-2 flex-shrink-0"
    style="background-color: var(--bg-primary);"
  >
    <div class="w-100" style="max-width: 768px;">
      <app-prompt-box (markdown)="onMarkdownChange($event)"></app-prompt-box>
    </div>
    <small
      class="text-center mt-1"
      style="color: var(--text-tertiary); font-size: 12px;"
    >
      AI Assistant can make mistakes. Verify important information.
    </small>
  </div>
</div>
