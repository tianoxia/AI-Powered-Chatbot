<header
  class="d-flex align-items-center justify-content-between border-bottom px-3 flex-shrink-0"
  style="height: 56px; background-color: var(--bg-primary);"
>
  <div class="d-flex align-items-center gap-2">
    <button
      class="btn btn-link text-decoration-none d-md-none p-1"
      (click)="onToggleMobileSidebar()"
      aria-label="Open sidebar"
    >
      <i class="bi bi-list fs-4" style="color: var(--text-primary);"></i>
    </button>
    <a class="d-flex align-items-center gap-2 text-decoration-none" href="#">
      <i class="bi bi-chat-dots fs-5" style="color: var(--brand-secondary);"></i>
      <span class="fw-semibold" style="font-size: 16px; color: var(--text-primary);">AI Assistant</span>
    </a>
  </div>
  <div class="d-flex align-items-center gap-2">
    <button
      class="btn btn-link text-decoration-none p-1"
      (click)="toggleTheme()"
      title="Toggle theme"
      style="color: var(--text-secondary); font-size: 18px;"
    >
      @if (currentTheme === 'dark') {
        <i class="bi bi-moon-fill"></i>
      } @else {
        <i class="bi bi-sun-fill"></i>
      }
    </button>
  </div>
</header>
